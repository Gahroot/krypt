packages:
  - "packages/*"

# Colyseus pulls @colyseus/uwebsockets-transport (an optional transport we don't use; the default
# is the pure-JS `ws` transport). It depends on uWebSockets.js via a GitHub tag, which pnpm 11
# blocks as an "exotic subdep" by default. Allow it so install completes. uWebSockets.js ships
# prebuilt binaries, so no native build runs.
blockExoticSubdeps: false

# Build-script allow-list (pnpm 11 `allowBuilds`: a map of package -> boolean). Below deps ship
# prebuilt platform binaries and don't need a local native build:
#   - esbuild: its install script isn't needed (tsx/vitest already work without it).
#   - msgpackr-extract (via @colyseus/msgpackr): ships prebuilt binaries and msgpackr falls back to
#     pure JS without them, so its build is unnecessary. Leaving it `false` keeps installs script-free.
#   - lefthook: its postinstall fetches the platform binary; MUST be `true` so the `lefthook`
#     executable is available for the root `prepare` script (`lefthook install`).
allowBuilds:
  better-sqlite3: true
  esbuild: false
  lefthook: true
  msgpackr-extract: false
