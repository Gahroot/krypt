# CryptoMaple — production stack: Caddy (auto-TLS) → game server + static client.
#
#   cp .env.production.example .env.production   # then edit it (domains + secrets)
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Caddy publishes :80/:443; the app containers are NOT published to the host —
# they are only reachable through the proxy. SQLite persists in the `server-data`
# volume; TLS certs persist in `caddy-data` (so renewals survive restarts).
services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    environment:
      - PORT=2567
      - HOST=0.0.0.0
      - NODE_ENV=production
      # Absolute path INSIDE the mounted volume below.
      - DATABASE_URL=sqlite:///app/data/maple.db
      # The only origin allowed to call the HTTP API — never "*" in production.
      - CORS_ORIGIN=${CORS_ORIGIN:?set CORS_ORIGIN to https://your-client-domain}
      # Secrets — generate with `openssl rand -hex 32`.
      - AUTH_SECRET=${AUTH_SECRET:?set AUTH_SECRET (>=16 chars) so sessions survive restarts}
      - MONITOR_SECRET=${MONITOR_SECRET:?set MONITOR_SECRET to protect /monitor}
      - ADMIN_SECRET=${ADMIN_SECRET:?set ADMIN_SECRET to protect /admin/*}
      - AUTH_TOKEN_TTL_SECONDS=${AUTH_TOKEN_TTL_SECONDS:-3600}
    volumes:
      - server-data:/app/data
    expose:
      - "2567"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2567/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Periodic DB backup — same image as the server, sharing the data volume. Runs
  # a consistent snapshot every BACKUP_INTERVAL_SECONDS and (if BACKUP_REMOTE_CMD
  # is set) ships it OFF-BOX. Snapshots live in the volume at /app/data/backups.
  backup:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    command: ["sh", "packages/server/scripts/backup-loop.sh"]
    environment:
      - DATABASE_URL=sqlite:///app/data/maple.db
      - BACKUP_DIR=/app/data/backups
      - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-86400}
      - BACKUP_RETENTION=${BACKUP_RETENTION:-14}
      # Off-box upload. {} is replaced with the snapshot path. UNSET ⇒ local-only
      # (NOT a real backup). e.g. 'rclone copy {} remote:maple-backups'
      - BACKUP_REMOTE_CMD=${BACKUP_REMOTE_CMD:-}
    volumes:
      - server-data:/app/data
    depends_on:
      - server

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
      args:
        # Baked into the bundle at BUILD time. Must be wss:// (the secure game
        # endpoint behind Caddy) — an https page cannot open a plaintext ws://.
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:?set VITE_BACKEND_URL to wss://your-game-domain}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      server:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - GAME_DOMAIN=${GAME_DOMAIN:?set GAME_DOMAIN, e.g. api.example.com}
      - CLIENT_DOMAIN=${CLIENT_DOMAIN:?set CLIENT_DOMAIN, e.g. play.example.com}
      - ACME_EMAIL=${ACME_EMAIL:?set ACME_EMAIL for Let's Encrypt}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - server
      - client

volumes:
  server-data:
  caddy-data:
  caddy-config:
